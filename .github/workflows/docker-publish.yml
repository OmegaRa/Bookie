name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.github/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY_GHCR: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install deps
        run: pip install flake8
      - name: Run flake8
        run: flake8 *.py --max-line-length=120 --ignore=E501,W503 || true

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Variables
        id: prep
        run: |
          echo "image_name=${GITHUB_REPOSITORY_OWNER,,}/bookie" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ steps.prep.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta,enable=${{ github.ref_name != github.event.repository.default_branch }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=bookie
            org.opencontainers.image.description=Self-hosted ebook manager
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Get build date
        id: build_date
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push
        id: build_step
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.ts }}
            GHCR_IMAGE=${{ env.REGISTRY_GHCR }}/${{ steps.prep.outputs.image_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
